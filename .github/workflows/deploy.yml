name: Deploy to ECS Express

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

env:
  AWS_REGION: ${{ vars.AWS_REGION }}
  AWS_ACCOUNT_ID: ${{ vars.AWS_ACCOUNT_ID }}
  ECR_REPOSITORY: ${{ vars.ECR_REPOSITORY }}
  ECS_SERVICE: ${{ vars.ECS_SERVICE }}
  ECS_CLUSTER: ${{ vars.ECS_CLUSTER }}

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    environment: production
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: arn:aws:iam::${{ env.AWS_ACCOUNT_ID }}:role/github-actions-ecs-role
          role-session-name: GitHubActionsCarrieraDeploy

      - name: Sync DynamoDB IAM policy
        id: sync-iam
        continue-on-error: true
        run: ./scripts/sync-dynamodb-iam.sh
        env:
          AWS_REGION: ${{ env.AWS_REGION }}
          AWS_ACCOUNT_ID: ${{ env.AWS_ACCOUNT_ID }}

      - name: IAM sync notice
        if: steps.sync-iam.outcome == 'failure' || steps.sync-iam.outcome == 'skipped'
        run: |
          echo "::warning::DynamoDB IAM policy was not synced. Bundle auth may fail until you run ./scripts/aws-ecs-express-setup.sh (or AWS CloudShell). See docs/DEPLOY-NOW.md"

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set image tag
        run: echo "IMAGE_TAG=${GITHUB_SHA:0:7}" >> "$GITHUB_ENV"

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ env.IMAGE_TAG }}
          # Fresh build — GHA cache was serving stale Astro bundles after mandate fixes.
          no-cache: true
          build-args: |
            PUBLIC_POLY_BUILDER_CODE=${{ secrets.PUBLIC_POLY_BUILDER_CODE }}
            PUBLIC_PRIVY_APP_ID=${{ secrets.PUBLIC_PRIVY_APP_ID }}
            PUBLIC_PRIVY_SIGNER_QUORUM_ID=${{ secrets.PUBLIC_PRIVY_SIGNER_QUORUM_ID }}

      - name: Deploy to ECS Express Mode
        id: deploy
        uses: aws-actions/amazon-ecs-deploy-express-service@v1
        with:
          service-name: ${{ env.ECS_SERVICE }}
          image: ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ env.IMAGE_TAG }}
          execution-role-arn: arn:aws:iam::${{ env.AWS_ACCOUNT_ID }}:role/ecsTaskExecutionRole
          infrastructure-role-arn: arn:aws:iam::${{ env.AWS_ACCOUNT_ID }}:role/ecsInfrastructureRoleForExpressServices
          container-port: 8080
          # Express defaults are 256 CPU / 512 MB — too small for Astro SSR +
          # Dynamo during rolling deploys (ALB 504s, hung health checks).
          cpu: "1024"
          memory: "2048"
          # Lightweight route — homepage SSR is too heavy/slow for ALB checks.
          health-check-path: /ping
          task-role-arn: arn:aws:iam::${{ env.AWS_ACCOUNT_ID }}:role/ecsTaskExecutionRole
          cluster: ${{ env.ECS_CLUSTER }}
          environment-variables: |
            [
              {"name": "BUILD_SHA", "value": "${{ env.IMAGE_TAG }}"},
              {"name": "POLY_BUILDER_API_KEY", "value": "${{ secrets.POLY_BUILDER_API_KEY }}"},
              {"name": "POLY_BUILDER_API_SECRET", "value": "${{ secrets.POLY_BUILDER_API_SECRET }}"},
              {"name": "POLY_BUILDER_PASSPHRASE", "value": "${{ secrets.POLY_BUILDER_PASSPHRASE }}"},
              {"name": "PRIVY_APP_SECRET", "value": "${{ secrets.PRIVY_APP_SECRET }}"},
              {"name": "PRIVY_AUTHORIZATION_PRIVATE_KEY", "value": "${{ secrets.PRIVY_AUTHORIZATION_PRIVATE_KEY }}"},
              {"name": "PUBLIC_PRIVY_APP_ID", "value": "${{ secrets.PUBLIC_PRIVY_APP_ID }}"},
              {"name": "FUNDS_TABLE", "value": "carriera-funds"},
              {"name": "CHALLENGES_TABLE", "value": "carriera-challenges"},
              {"name": "MANDATES_TABLE", "value": "carriera-mandates"},
              {"name": "MANAGERS_TABLE", "value": "carriera-managers"},
              {"name": "AWS_REGION", "value": "${{ env.AWS_REGION }}"}
            ]

      # Express action exits after 15m while rollout may still be IN_PROGRESS.
      # Require /ping to return this IMAGE_TAG so we never green on the old fleet.
      - name: Verify this commit is live
        env:
          LIVE_URL: https://ca-a2338ec1790141a0aa696b7ee81157a9.ecs.eu-west-1.on.aws
        run: |
          set -euo pipefail
          for i in $(seq 1 90); do
            ping_body=$(curl -sS --max-time 15 "$LIVE_URL/ping" || true)
            code=$(curl -s -o /dev/null -w '%{http_code}' --max-time 15 "$LIVE_URL/ping" || true)
            if [ "$code" = "200" ] && echo "$ping_body" | grep -q "$IMAGE_TAG"; then
              # BUILD_SHA matching this commit is the real gate; homepage 200 confirms SSR works.
              home=$(curl -s -o /dev/null -w '%{http_code}' --max-time 30 "$LIVE_URL/" || true)
              if [ "$home" = "200" ]; then
                echo "Live: BUILD_SHA=$ping_body home=200"
                exit 0
              fi
              echo "attempt $i: sha ok ($ping_body) but / -> $home"
            else
              echo "attempt $i: /ping -> $code body=${ping_body:0:40}"
            fi
            sleep 20
          done
          echo "::error::Deployed image never became healthy with this commit"
          exit 1
